<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alerta Betim – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/inicio.css"/>
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: #090018;
      border: 1px solid #3b0a5a;
      border-radius: 14px;
      padding: 2.2rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 40px rgba(121,39,203,0.15);
    }

    body.light .auth-card {
      background: white;
      border: 1px solid #e2cfff;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .auth-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7927cb, #0e9cb8);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 1rem;
    }

    .auth-header h2 {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      margin-bottom: .3rem;
    }
    body.light .auth-header h2 { color: #1f1f1f; }

    .auth-form .form-group {
      margin-bottom: 1rem;
    }

    .auth-form label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #aaa;
      margin-bottom: .35rem;
      text-transform: uppercase;
    }

    .auth-form input {
      width: 100%;
      background: #0b0220;
      border: 1px solid #3b0a5a;
      border-radius: 6px;
      color: white;
      padding: .65rem .9rem;
      outline: none;
    }
    body.light .auth-form input {
      background: white;
      border: 1px solid #d9c3ff;
      color: #1f1f1f;
    }

    .btn-auth {
      width: 100%;
      padding: .75rem;
      background: linear-gradient(135deg, #7927cb, #0e9cb8);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      margin-top: .5rem;
    }

    .auth-switch {
      text-align: center;
      font-size: 13px;
      margin-top: 1.2rem;
    }

    .auth-switch a {
      color: #0e9cb8;
      text-decoration: none;
      font-weight: bold;
    }

    .error-msg {
      background: rgba(239,68,68,.12);
      border: 1px solid #ef4444;
      border-radius: 6px;
      color: #f87171;
      font-size: 13px;
      padding: .65rem .9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .hint-box {
      background: rgba(14,156,184,.08);
      border: 1px solid rgba(14,156,184,.3);
      border-radius: 6px;
      padding: .75rem .9rem;
      margin-top: 1.2rem;
      font-size: 12px;
    }
  </style>
</head>
<body class="light app-shell auth-page">
  <div class="auth-wrapper">

    <header>
      <div class="Logo">
        <img src="../imagens/Imagem_Logo.png" alt="Logo" width="70px">
        <div class="texto">
          <h1>ALERTA BETIM</h1>
          <h2>Sua voz transforma a cidade</h2>
        </div>
        <div class="botoes">
          <a href="../index.html"><button type="button" class="btn btn-outline-primary">Início</button></a>
          <a href="../index.html#mapaSecao"><button type="button" class="btn btn-outline-primary">Mapa</button></a>
          <a href="reportar.html"><button type="button" class="btn btn-outline-primary">Reportar</button></a>
          <a href="login.html"><button type="button" class="btn btn-outline-primary active">Perfil</button></a>

          <!-- BOTÃO SOL -->
          <button type="button" class="temaBtn claro btn btn-dark">
            <img src="../imagens/icone_sol.png" width="20px">
          </button>

          <!-- BOTÃO LUA -->
          <button type="button" class="temaBtn escuro btn btn-dark">
            <img src="../imagens/icone_lua.png" width="20px">
          </button>
        </div>
      </div>
    </header>

    <div class="auth-main">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-icon">👤</div>
            <h2>Entrar na conta</h2>
            <p>Acesse sua conta para participar</p>
          </div>

          <div class="error-msg" id="errorMsg"></div>

          <div class="auth-form">
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="inputEmail" placeholder="seu@email.com"/>
            </div>
            <div class="form-group">
              <label>Senha</label>
              <input type="password" id="inputPassword" placeholder="••••••••"/>
            </div>
            <button class="btn-auth" id="btnLogin">Entrar</button>
          </div>

          <div class="auth-switch">
            Ainda não tem conta? <a href="cadastro.html">Criar conta</a>
          </div>

          <div class="hint-box">
            <p>Use uma conta cadastrada no Alerta Betim. A autenticação agora é feita pelo Supabase.</p>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <div><h1>ALERTA BETIM</h1></div>
      <p>Plataforma de participação cidadã em Betim, MG.</p>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/tema.js"></script>
  <script>
    CloudDB.getSession().then(session => {
      if (session) location.href = 'perfil.html';
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('inputEmail').value.trim();
      const password = document.getElementById('inputPassword').value;
      const errEl = document.getElementById('errorMsg');

      errEl.classList.remove('show');

      if (!email || !password) {
        errEl.textContent = 'Preencha todos os campos.';
        errEl.classList.add('show');
        return;
      }

      try {
        await CloudDB.login(email, password);
        location.href = 'perfil.html';
      } catch (error) {
        errEl.textContent = error.message || 'E-mail ou senha incorretos.';
        errEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
